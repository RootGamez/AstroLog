services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: astrolog
      POSTGRES_PASSWORD: astrologpass
      POSTGRES_DB: astrologdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    env_file:
      - ./Backend/.env
    environment:
      - DATABASE_URL=postgresql+psycopg2://astrolog:astrologpass@db:5432/astrologdb
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
